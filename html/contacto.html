    <hr>
    <div class="main-section">
        <form name="formulario" method="post" enctype="multipart/form-data" >
            <fieldset>
                <legend>Datos Personales</legend>
                <div>
                    <label>
                        Nombre:
                        <input type="text" name="nombre" placeholder="Introduce tu nombre..." required title="Introduzca un nombre"/>
                        *
                     </label> 
                </div>
                <div>
                    <label>
                        Apellidos:
                        <input type="text" name="apellidos" placeholder="Introduce tu apellido..." required>
                        *
                     </label>
                </div>
                <div>
                    <label>
                        Email:
                        <input type="text" name="correo" pattern="^.+@(gmail|hotmail)\.com$"  required placeholder="usuario@email.com"
                         title="El formato es @gmail.com o @hotmail.com">
                        *
                    </label>
                </div>
                <div>
                    <label>
                        Fecha de Nacimiento:
                        <input type="date" name="edad" min="18" max="100" placeholder="18" >
                    </label>
                </div>
                <div>
                    <label>
                        Edad:
                        <input type="number" min="18" max="100"/>
                    </label>
                </div>
                <div>
                    Sexo:
                    <label><input type="radio" name="sexo" value="H" checked/>Hombre</label>
                    <label><input type="radio" name="sexo" value="M"/>Mujer</label>
                </div>
                <div>
                    País:
                    <label>
                        <label for="idioma"></label>
                        <select id="idioma" name="idioma">
                            <option value="" selected="selected" >- selecciona -</option>
                            <option value="España"> España</option>
                            <option value="Italia"> Italia</option>
                            <option value="Francia"> Francia</option>
                            <option value="Portugal"> Portugal</option>
                        </select>
                    </label>
                </div>
            </fieldset>
            <fieldset>
                <legend>Otros Datos</legend>
                <div>
                    Mensaje:
                    <textarea type="text" name="texto" rows="10" cols="40" spellcheck="true" placeholder="Introduce tu texto..."></textarea>
                </div>
                <div>
                    Adjuntar foto:
                    <input type="file" name="adjunto" accept=".jpg,.png" multiple/>
                </div>
            </fieldset>
            <div>
                <input type="checkbox" name="condiciones" required/>
                Aceptas las condiciones
            </div>
            <button type="submit">Enviar:</button>
            <button type="reset">Reiniciar:</button>
        </form>
